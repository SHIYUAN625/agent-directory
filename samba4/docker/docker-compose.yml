services:
  dc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agent-directory-dc
    hostname: dc1
    platform: linux/amd64
    # Minimal capabilities instead of privileged.
    # VFS ACLs are disabled (--option="vfs objects=") so POSIX ACL support
    # is not required. SYS_ADMIN is needed for Samba's internal operations.
    cap_add:
      - SYS_ADMIN
      - NET_BIND_SERVICE
    security_opt:
      - apparmor:unconfined
    environment:
      # Do not commit secrets. Set SAMBA_ADMIN_PASSWORD in shell or samba4/docker/.env.
      SAMBA_DOMAIN: ${SAMBA_DOMAIN:-AUTONOMY}
      SAMBA_REALM: ${SAMBA_REALM:-AUTONOMY.LOCAL}
      SAMBA_ADMIN_PASSWORD: ${SAMBA_ADMIN_PASSWORD:?Set SAMBA_ADMIN_PASSWORD before running docker compose}
      SAMBA_DNS_FORWARDER: ${SAMBA_DNS_FORWARDER:-8.8.8.8}
    ports:
      # Bind to loopback only — AD services should not be network-exposed in dev
      - "127.0.0.1:389:389"       # LDAP
      - "127.0.0.1:636:636"       # LDAPS
      - "127.0.0.1:8888:88"       # Kerberos (mapped to avoid macOS KDC conflict)
      - "127.0.0.1:4450:445"      # SMB (mapped to avoid macOS SMB conflict)
      - "127.0.0.1:3268:3268"     # Global Catalog
      - "127.0.0.1:5354:53/udp"   # DNS (mapped to avoid macOS mDNS on 5353)
      - "127.0.0.1:5354:53/tcp"
    volumes:
      - samba-data:/var/lib/samba
      - samba-etc:/etc/samba
    healthcheck:
      test: ["CMD", "/opt/samba-ad/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - dc1.autonomy.local

  nats:
    image: nats:2.10-alpine
    container_name: agent-directory-nats
    hostname: nats
    command: ["--config", "/etc/nats/nats-server.conf"]
    environment:
      - NATS_PASSWORD=${NATS_PASSWORD:?Set NATS_PASSWORD before running docker compose}
      - NATS_WORKER_PASSWORD=${NATS_WORKER_PASSWORD:?Set NATS_WORKER_PASSWORD before running docker compose}
      - NATS_COORDINATOR_PASSWORD=${NATS_COORDINATOR_PASSWORD:?Set NATS_COORDINATOR_PASSWORD before running docker compose}
      - NATS_ANALYST_PASSWORD=${NATS_ANALYST_PASSWORD:?Set NATS_ANALYST_PASSWORD before running docker compose}
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/jetstream
    ports:
      - "127.0.0.1:14222:4222"
      - "127.0.0.1:18222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - nats.autonomy.local

  agent:
    build:
      context: ../../..
      dockerfile: agent-directory/samba4/docker/Dockerfile.agent
    container_name: agent-runner
    hostname: agent-runner
    depends_on:
      dc:
        condition: service_healthy
    environment:
      - AGENT_AD_LDAP_URI=ldap://dc1.autonomy.local
      - AGENT_AD_BASE_DN=DC=autonomy,DC=local
      - AGENT_PSHAGENT_PATH=/opt/psh-agent/PshAgent
      - AGENT_SYSVOL_PATH=/mnt/samba/sysvol/autonomy.local
      - AGENT_TOOL_MAPPING=/opt/agent-launcher/tool-mapping.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - samba-data:/mnt/samba:ro
      - /workspace
    stdin_open: true
    tty: true
    profiles:
      - agent

  e2e:
    build:
      context: ../..
      dockerfile: samba4/docker/Dockerfile.e2e
    container_name: agent-directory-e2e
    depends_on:
      dc:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - SAMBA_REALM=${SAMBA_REALM:-AUTONOMY.LOCAL}
      - SAMBA_ADMIN_PASSWORD=${SAMBA_ADMIN_PASSWORD}
      - NATS_URL=nats://coordinator:${NATS_COORDINATOR_PASSWORD}@nats.autonomy.local:4222
      - AGENT_AD_LDAP_URI=ldap://dc1.autonomy.local
      - AGENT_AD_BASE_DN=DC=autonomy,DC=local
      - AGENT_SYSVOL_PATH=/mnt/samba/sysvol/autonomy.local
    volumes:
      - samba-data:/mnt/samba:ro
    profiles:
      - e2e
    networks:
      default:

volumes:
  samba-data:
  samba-etc:
  nats-data:
