listen: 0.0.0.0:4222
server_name: nats-dev
http_port: 8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Agents authenticate by type role (worker, coordinator, …).
# Passwords are shared per type — set via environment variables
# that match what the provisioner reads. Provisioner auth mode
# should be set to password for this config:
#   NATS_AUTH_MODE=password
#   NATS_PASSWORD              — provisioner service account
#   NATS_WORKER_PASSWORD       — worker agents
#   NATS_COORDINATOR_PASSWORD  — coordinator agents
#   NATS_ANALYST_PASSWORD      — analyst agents

authorization {
  default_permissions {
    publish { deny: ">" }
    subscribe { deny: ">" }
  }

  users: [
    # Provisioner service — full access for pub/sub management
    {
      user: "provisioner"
      password: $NATS_PASSWORD
      permissions: {
        publish: ">"
        subscribe: ">"
      }
    }

    # Coordinator agents — task distribution and escalation
    {
      user: "coordinator"
      password: $NATS_COORDINATOR_PASSWORD
      permissions: {
        publish: [
          "tasks.>",
          "events.>",
          "results.>",
          "escalations.>",
          "_INBOX.>",
          "$JS.ACK.>",
          "$js.ack.>",
          "$JS.API.>",
          "$js.api.>"
        ]
        subscribe: [
          "tasks.>",
          "events.>",
          "results.>",
          "escalations.>",
          "_INBOX.>",
          "$JS.API.>",
          "$js.api.>"
        ]
      }
    }

    # Worker agents — receive tasks, emit events, escalate
    {
      user: "worker"
      password: $NATS_WORKER_PASSWORD
      permissions: {
        publish: [
          "events.agent.>",
          "results.>",
          "escalations.>",
          "_INBOX.>",
          "$JS.ACK.>",
          "$js.ack.>"
        ]
        subscribe: ["tasks.>", "_INBOX.>"]
      }
    }

    # Analyst agents — read-only on events, write analysis results
    {
      user: "analyst"
      password: $NATS_ANALYST_PASSWORD
      permissions: {
        publish: ["events.analyst.>", "_INBOX.>", "$JS.ACK.>", "$js.ack.>"]
        subscribe: ["events.>", "tasks.analyst.>", "_INBOX.>"]
      }
    }
  ]
}
